services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postureflow-api
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    networks:
      postureflow:
        ipv4_address: 172.30.0.12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: postureflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postureflow_user
      POSTGRES_PASSWORD: postureflow_password
      POSTGRES_DB: postureflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    networks:
      postureflow:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postureflow_user -d postureflow_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: postureflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_v2:/data
    networks:
      postureflow:
        ipv4_address: 172.30.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  postureflow:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres_data_v2:
    name: postureflow-api_postgres_data_v2
  redis_data_v2:
    name: postureflow-api_redis_data_v2
